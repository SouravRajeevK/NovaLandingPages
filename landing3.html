<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Facing divorce or separation? — Nova</title>
  <style>
    @font-face { font-family: "Perfectly Nineties"; src: url("fonts/PerfectlyNineties-Regular.woff") format("woff"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "Neue Haas Display"; src: url("fonts/NeueHaasDisplayRoman.woff") format("woff"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "Neue Haas Display"; src: url("fonts/NeueHaasDisplayMediu.woff") format("woff"); font-weight: 500; font-style: normal; font-display: swap; }
    * { box-sizing: border-box; margin: 0; }
    :root {
      --nova-dark-orange: #E8731E;
      --nova-dark-amber: #F6CF9B;
      --nova-active: #FFDDB3;
      --nova-orange: #FF6A42;
    }
    html {
      overflow-x: clip;
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: "Neue Haas Display", system-ui, sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      background: #f2f7f5;
      min-height: 100dvh;
      min-height: 100vh;
      overflow-x: clip;
      overflow-y: auto;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.14;
      background: url("gradients/backgradientpink.png") center/cover no-repeat;
      filter: hue-rotate(125deg) saturate(0.65);
    }
    .hero {
      position: relative; z-index: 1;
      min-height: 100dvh;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding:
        max(clamp(1.25rem, 5vw, 2.25rem), env(safe-area-inset-top))
        max(clamp(0.75rem, 3vw, 1.5rem), env(safe-area-inset-right))
        max(clamp(1.25rem, 5vw, 2.25rem), env(safe-area-inset-bottom))
        max(clamp(0.75rem, 3vw, 1.5rem), env(safe-area-inset-left));
    }
    .hero-bg { position: absolute; inset: 0; z-index: 0; min-height: 100%; }
    .hero-bg img {
      width: 100%; height: 100%; min-height: 100%;
      object-fit: cover; object-position: 50% 40%;
    }
    .hero-bg::after {
      content: ""; position: absolute; inset: 0;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.32) 0%,
        transparent 5%,
        transparent 95%,
        rgba(0, 0, 0, 0.32) 100%
      );
    }
    .hero-inner {
      position: relative; z-index: 2; width: 100%; max-width: min(560px, 100%);
      flex-shrink: 0;
      text-align: center;
    }
    .mark {
      height: clamp(34px, 6vw, 44px); width: auto;
      margin-bottom: clamp(0.9rem, 2.8vw, 1.35rem); opacity: 0.95;
    }
    h1 {
      font-family: "Perfectly Nineties", Georgia, serif; font-weight: 400;
      color: #fff;
      font-size: clamp(2rem, 7.5vw, 3.75rem); line-height: 1.05; letter-spacing: -0.03em;
      margin-bottom: clamp(0.85rem, 2.4vw, 1.25rem); text-wrap: balance;
      margin-left: auto; margin-right: auto;
      max-width: 22ch;
    }
    .sub {
      font-size: clamp(1rem, 3.2vw, 1.2rem); line-height: 1.45; color: #fff;
      margin-bottom: clamp(1rem, 3vw, 1.35rem);
      max-width: 36ch; margin-left: auto; margin-right: auto;
    }
    .detail {
      font-size: clamp(0.88rem, 2.2vw, 0.98rem); line-height: 1.5; color: #fff;
      margin-bottom: clamp(1.35rem, 4.5vw, 2rem);
      max-width: 38ch; margin-left: auto; margin-right: auto;
    }
    .detail em { font-style: italic; color: #fff; }
    .cta {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; max-width: min(320px, 100%); padding: 0.95rem 1.5rem;
      font-family: inherit; font-size: clamp(1rem, 2.8vw, 1.12rem); font-weight: 500;
      color: #000;
      background: #fff;
      border-radius: 999px; text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow:
        0 12px 36px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
      transition:
        transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        background 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        color 0.45s cubic-bezier(0.22, 1, 0.36, 1),
        border-color 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .cta::before {
      content: "";
      position: absolute;
      inset: -40% -60%;
      background: linear-gradient(
        115deg,
        transparent 35%,
        rgba(255, 255, 255, 0.45) 48%,
        rgba(255, 255, 255, 0.65) 50%,
        rgba(255, 255, 255, 0.45) 52%,
        transparent 65%
      );
      transform: translateX(-100%) rotate(0.001deg);
      transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
      z-index: 0;
    }
    .cta:hover {
      /* color: #fff; */
      background: linear-gradient(
        135deg,
        var(--nova-orange) 0%,
        #ff7a4a 38%,
        var(--nova-dark-orange) 100%
      );
      border-color: rgba(255, 221, 179, 0.45);
      box-shadow:
        0 18px 44px rgba(232, 115, 30, 0.38),
        0 4px 16px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        0 0 0 1px rgba(255, 221, 179, 0.22);
      transform: translateY(-3px) scale(1.015);
    }
    .cta:hover::before {
      transform: translateX(100%) rotate(0.001deg);
    }
    .cta:active {
      transform: translateY(-1px) scale(1.005);
      transition-duration: 0.12s;
    }
    @media (prefers-reduced-motion: reduce) {
      .cta,
      .cta::before {
        transition-duration: 0.01ms;
      }
      .cta:hover,
      .cta:active {
        transform: none;
      }
      .cta:hover::before {
        transform: translateX(-100%);
      }
    }
    .cta:focus-visible {
      outline: 2px solid var(--nova-active);
      outline-offset: 3px;
    }
    .micro { margin-top: clamp(0.7rem, 2.2vw, 1rem); font-size: 0.78rem; color: rgba(255, 255, 255, 0.88); }

  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="v1-h">
      <div class="hero-bg" aria-hidden="true">
        <img src="hero/doorbackground.webp" alt="" width="1200" height="1600" fetchpriority="high" decoding="async" />
      </div>
      <div class="hero-inner">
        <img class="mark" src="logo/Logo.png" alt="Nova" width="165" height="44" decoding="async" />
        <h1 id="v1-h">Facing divorce or separation?</h1>
        <p class="sub">A free, personalised path forward — clear steps, vetted family law experts, no judgement. You’re not alone in this.</p>
        <a class="cta" href="#">Get your free recommendation</a>
        <p class="micro">5–10 minutes · No obligation · Secure &amp; confidential</p>
      </div>
    </section>
  </main>
</body>
</html>
