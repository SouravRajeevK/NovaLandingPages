<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Going through a separation? — Nova</title>
  <style>
    :root {
      --nova-dark-orange: #E8731E;
      --nova-dark-amber: #F6CF9B;
      --nova-active: #FFDDB3;
      --nova-orange: #FF6A42;
    }
    @font-face { font-family: "Perfectly Nineties"; src: url("fonts/PerfectlyNineties-Regular.woff") format("woff"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "Neue Haas Display"; src: url("fonts/NeueHaasDisplayRoman.woff") format("woff"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "Neue Haas Display"; src: url("fonts/NeueHaasDisplayMediu.woff") format("woff"); font-weight: 500; font-style: normal; font-display: swap; }
    * { box-sizing: border-box; margin: 0; }
    html {
      overflow-x: clip;
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: "Neue Haas Display", system-ui, sans-serif;
      color: #000;
      -webkit-font-smoothing: antialiased;
      background: #fff;
      min-height: 100dvh;
      min-height: 100vh;
      overflow-x: clip;
      overflow-y: auto;
    }
    .hero {
      position: relative;
      min-height: 100dvh;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
      align-items: stretch;
      gap: clamp(1.25rem, 4vw, 3rem);
      max-width: min(1200px, 100%);
      margin: 0 auto;
      padding:
        max(clamp(1.25rem, 5vw, 2.25rem), env(safe-area-inset-top))
        max(clamp(0.75rem, 3vw, 1.5rem), env(safe-area-inset-right))
        max(clamp(1.25rem, 5vw, 2.25rem), env(safe-area-inset-bottom))
        max(clamp(0.75rem, 3vw, 1.5rem), env(safe-area-inset-left));
    }
    .hero-visual {
      position: relative;
      border-radius: clamp(12px, 2vw, 20px);
      overflow: hidden;
      min-height: min(280px, 45dvh);
      align-self: center;
      max-height: min(92dvh, 900px);
      width: 100%;
    }
    .hero-visual img {
      display: block;
      width: 100%;
      height: 100%;
      min-height: min(52dvh, 520px);
      object-fit: cover;
      object-position: 50% 38%;
    }
    .hero-inner {
      position: relative;
      width: 100%;
      max-width: min(520px, 100%);
      justify-self: end;
      align-self: center;
      text-align: left;
      padding-right: clamp(0, 4vw, 1rem);
    }
    .mark {
      height: clamp(34px, 6vw, 44px); width: auto;
      margin-bottom: clamp(0.9rem, 2.8vw, 1.35rem); opacity: 0.95;
    }
    h1 {
      font-family: "Perfectly Nineties", Georgia, serif; font-weight: 400;
      color: #000;
      font-size: clamp(2rem, 7.5vw, 3.75rem); line-height: 1.05; letter-spacing: -0.03em;
      margin-bottom: clamp(0.85rem, 2.4vw, 1.25rem); text-wrap: balance;
      max-width: 22ch;
    }
    .sub {
      font-size: clamp(1rem, 3.2vw, 1.2rem); line-height: 1.45; color: #000;
      margin-bottom: clamp(1rem, 3vw, 1.35rem);
      max-width: 36ch;
    }
    .detail {
      font-size: clamp(0.88rem, 2.2vw, 0.98rem); line-height: 1.5; color: #000;
      margin-bottom: clamp(1.35rem, 4.5vw, 2rem);
      max-width: 38ch;
    }
    .detail em { font-style: italic; color: #000; }
    .cta {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; max-width: min(320px, 100%); padding: 0.95rem 1.5rem;
      font-family: inherit; font-size: clamp(1rem, 2.8vw, 1.12rem); font-weight: 500;
      color: #fff;
      background: linear-gradient(145deg, var(--nova-dark-orange) 0%, var(--nova-orange) 100%);
      border-radius: 999px;
      text-decoration: none;
      border: 1px solid color-mix(in srgb, var(--nova-dark-amber) 55%, transparent);
      box-shadow:
        0 10px 28px color-mix(in srgb, var(--nova-dark-orange) 38%, transparent),
        inset 0 1px 0 color-mix(in srgb, #fff 28%, transparent);
      transition:
        background 0.35s ease,
        box-shadow 0.35s ease,
        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        border-color 0.35s ease;
    }
    .cta:hover {
      background: linear-gradient(145deg, var(--nova-orange) 0%, var(--nova-dark-orange) 52%, var(--nova-dark-orange) 100%);
      border-color: var(--nova-active);
      box-shadow:
        0 16px 40px color-mix(in srgb, var(--nova-orange) 42%, transparent),
        0 0 0 3px var(--nova-dark-amber),
        inset 0 1px 0 color-mix(in srgb, #fff 35%, transparent);
      transform: translateY(-2px);
    }
    .cta:active {
      transform: translateY(0);
      box-shadow:
        0 6px 20px color-mix(in srgb, var(--nova-dark-orange) 32%, transparent),
        inset 0 2px 6px color-mix(in srgb, #000 12%, transparent);
    }
    .cta:focus-visible {
      outline: 2px solid var(--nova-orange);
      outline-offset: 3px;
    }
    .micro { margin-top: clamp(0.7rem, 2.2vw, 1rem); font-size: 0.9rem; color: #000; }

    @media (max-width: 720px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
        padding-bottom: max(clamp(1.5rem, 5vw, 2rem), env(safe-area-inset-bottom));
      }
      .hero-visual {
        max-height: 42dvh;
        min-height: 200px;
      }
      .hero-visual img {
        min-height: 200px;
        max-height: 42dvh;
      }
      .hero-inner {
        justify-self: stretch;
        max-width: none;
        padding-right: 0;
        text-align: center;
      }
      .hero-inner h1,
      .hero-inner .sub,
      .hero-inner .detail {
        margin-left: auto;
        margin-right: auto;
      }
      .hero-inner .mark { margin-left: auto; margin-right: auto; display: block; }
      .hero-inner .cta { margin-left: auto; margin-right: auto; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="v35-h">
      <div class="hero-visual" aria-hidden="true">
        <img src="hero/couplesad.webp" alt="" width="1000" height="1200" fetchpriority="high" decoding="async" />
      </div>
      <div class="hero-inner">
        <img class="mark" src="logo/Logo.png" alt="Nova" width="165" height="44" decoding="async" />
        <h1 id="v35-h">There's a better way through this.</h1>
        <p class="sub">Answer a few questions and get a personalised path forward.</p>
        <a class="cta" href="#">Get your free recommendation</a>
        <p class="micro">A few minutes. No pressure. There's no commitment here just clarity</p>
      </div>
    </section>
  </main>
</body>
</html>
