<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Facing divorce or separation? — Nova</title>
  <style>
    :root {
      --nova-dark-orange: #E8731E;
      --nova-dark-amber: #F6CF9B;
    }
    @font-face { font-family: "Perfectly Nineties"; src: url("fonts/PerfectlyNineties-Regular.woff") format("woff"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "Neue Haas Display"; src: url("fonts/NeueHaasDisplayRoman.woff") format("woff"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "Neue Haas Display"; src: url("fonts/NeueHaasDisplayMediu.woff") format("woff"); font-weight: 500; font-style: normal; font-display: swap; }
    * { box-sizing: border-box; margin: 0; }
    html {
      overflow-x: clip;
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: "Neue Haas Display", system-ui, sans-serif;
      color: #2d2640;
      -webkit-font-smoothing: antialiased;
      background: #faf8ff;
      min-height: 100dvh;
      min-height: 100vh;
      overflow-x: clip;
      overflow-y: auto;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.12;
      background: url("gradients/backgradientpink.png") center/cover no-repeat;
      filter: hue-rotate(45deg) saturate(0.7);
    }
    .hero {
      position: relative; z-index: 1;
      min-height: 100dvh;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding:
        max(clamp(1.25rem, 5vw, 2.25rem), env(safe-area-inset-top))
        max(clamp(0.75rem, 3vw, 1.5rem), env(safe-area-inset-right))
        max(clamp(1.25rem, 5vw, 2.25rem), env(safe-area-inset-bottom))
        max(clamp(0.75rem, 3vw, 1.5rem), env(safe-area-inset-left));
    }
    .hero-bg { position: absolute; inset: 0; z-index: 0; min-height: 100%; }
    .hero-bg picture {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 100%;
    }
    .hero-bg img {
      width: 100%; height: 100%; min-height: 100%;
      object-fit: cover; object-position: 50% 35%;
    }
    .hero-bg::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(
        180deg,
        rgba(250,248,255, 0.94) 0%,
        rgba(255,255,255, 0.48) 40%,
        rgba(240,235,252, 0.93) 100%
      );
    }
    .hero-inner {
      position: relative; z-index: 2; width: 100%; max-width: min(560px, 100%);
      flex-shrink: 0;
      text-align: center;
    }
    .mark {
      height: 88px; width: auto;
      margin-bottom: clamp(0.9rem, 2.8vw, 1.35rem); opacity: 0.95;
    }
    h1 {
      font-family: "Perfectly Nineties", Georgia, serif; font-weight: 400;
      color: #1e1833;
      font-size: clamp(2rem, 7.5vw, 3.75rem); line-height: 1.05; letter-spacing: -0.03em;
      margin-bottom: clamp(0.85rem, 2.4vw, 1.25rem); text-wrap: balance;
      margin-left: auto; margin-right: auto;
      max-width: 22ch;
    }
    .sub {
      font-size: clamp(1rem, 3.2vw, 1.2rem); line-height: 1.45; color: #5b5470;
      margin-bottom: clamp(1rem, 3vw, 1.35rem);
      max-width: 36ch; margin-left: auto; margin-right: auto;
    }
    .detail {
      font-size: clamp(0.88rem, 2.2vw, 0.98rem); line-height: 1.5; color: #5b5470;
      margin-bottom: clamp(1.35rem, 4.5vw, 2rem);
      max-width: 38ch; margin-left: auto; margin-right: auto;
    }
    .detail em { font-style: italic; color: #5b5470; }
    .cta {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; max-width: min(320px, 100%); padding: 0.95rem 1.5rem;
      font-family: inherit; font-size: clamp(1rem, 2.8vw, 1.12rem); font-weight: 500;
      color: #fff; background: #000; border-radius: 999px; text-decoration: none;
      box-shadow: 0 12px 36px rgba(0,0,0,0.12);
      transition: background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    }
    .cta:hover {
      color: #0d0d0d;
      background: linear-gradient(125deg, var(--nova-dark-orange) 0%, var(--nova-dark-amber) 100%);
      box-shadow: 0 14px 40px rgba(232, 115, 30, 0.32);
    }
    .cta:focus-visible { outline: 2px solid var(--nova-dark-orange); outline-offset: 3px; }
    .micro { margin-top: clamp(0.7rem, 2.2vw, 1rem); font-size: 0.78rem; color: #6b6580; }

    @media (max-width: 768px) {
      .hero-inner {
        padding: clamp(1.15rem, 4vw, 1.65rem) clamp(1rem, 4vw, 1.35rem);
        border-radius: 1.25rem;
        background: rgba(250, 248, 255, 0.78);
        backdrop-filter: blur(18px) saturate(1.12);
        -webkit-backdrop-filter: blur(18px) saturate(1.12);
        box-shadow:
          0 4px 24px rgba(45, 38, 64, 0.07),
          0 1px 0 rgba(255, 255, 255, 0.9) inset;
        border: 1px solid rgba(255, 255, 255, 0.72);
      }
      .hero-inner .mark {
        margin-bottom: clamp(0.75rem, 2.5vw, 1.1rem);
      }
    }
    @supports not (backdrop-filter: blur(1px)) {
      @media (max-width: 768px) {
        .hero-inner {
          background: rgba(250, 248, 255, 0.92);
        }
      }
    }

  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="v3-h">
      <div class="hero-bg" aria-hidden="true">
        <picture>
          <source media="(max-width: 768px)" srcset="hero/oppositeclose.webp" type="image/webp" />
          <img src="hero/oppositecouples.webp" alt="" width="1200" height="1600" fetchpriority="high" decoding="async" />
        </picture>
      </div>
      <div class="hero-inner">
        <img class="mark" src="logo/Logo.png" alt="Nova" />
        <h1 id="v3-h">Facing divorce or separation?</h1>
        <p class="sub">A free, personalised path forward — clear steps, vetted family law experts, no judgement. You’re not alone in this.</p>
        <a class="cta" href="#">Get your free recommendation</a>
        <p class="micro">5–10 minutes · No obligation · Secure &amp; confidential</p>
      </div>
    </section>
  </main>
</body>
</html>
