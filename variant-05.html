<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Nova — Variant 05</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --nova-dark-orange: #E8731E;
      --nova-active: #FFDDB3;
      --copy: #2a1406;
      --copy-muted: rgba(42, 20, 6, 0.82);
    }

    * {
      box-sizing: border-box;
      margin: 0;
    }

    html {
      overflow-x: clip;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: "Outfit", system-ui, sans-serif;
      color: var(--copy);
      -webkit-font-smoothing: antialiased;
      background: linear-gradient(155deg, var(--nova-dark-orange) 0%, var(--nova-active) 100%);
      background-attachment: fixed;
      min-height: 100dvh;
      min-height: 100vh;
      overflow-x: clip;
    }

    .shell {
      min-height: 100dvh;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(clamp(1rem, 4vw, 1.75rem), env(safe-area-inset-top))
        max(clamp(1rem, 4vw, 1.5rem), env(safe-area-inset-right))
        max(clamp(1.25rem, 5vw, 2rem), env(safe-area-inset-bottom))
        max(clamp(1rem, 4vw, 1.5rem), env(safe-area-inset-left));
    }

    .grid {
      width: 100%;
      max-width: min(1080px, 100%);
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(1.5rem, 4vw, 2.75rem);
      align-items: center;
    }

    @media (min-width: 768px) {
      .grid {
        grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
        gap: clamp(2rem, 5vw, 3.5rem);
      }
    }

    .copy {
      order: 1;
      text-align: center;
      max-width: 36rem;
      margin-inline: auto;
    }

    @media (min-width: 768px) {
      .copy {
        text-align: left;
        margin-inline: 0;
        justify-self: start;
      }
    }

    .copy h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 700;
      font-size: 56px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--copy);
      text-wrap: balance;
      margin-bottom: clamp(0.75rem, 2.5vw, 1rem);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .copy .lede {
      font-size: clamp(0.95rem, 2.4vw, 1.08rem);
      font-weight: 400;
      line-height: 1.6;
      color: var(--copy-muted);
      margin-bottom: clamp(1.25rem, 3.5vw, 1.75rem);
      max-width: 38ch;
      margin-inline: auto;
    }

    @media (min-width: 768px) {
      .copy .lede {
        margin-inline: 0;
      }
    }

    .copy .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    @media (min-width: 768px) {
      .copy .cta-row {
        justify-content: flex-start;
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0.85rem 1.35rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-decoration: none;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .btn:focus-visible {
      outline: 3px solid #1a0d04;
      outline-offset: 3px;
    }

    .btn--primary {
      background: #1a0d04;
      color: #fffaf5;
      box-shadow: 0 4px 16px rgba(26, 13, 4, 0.25);
    }

    .btn--primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(26, 13, 4, 0.3);
    }

    .btn--ghost {
      background: rgba(255, 255, 255, 0.45);
      color: var(--copy);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.55);
    }

    .btn--ghost:hover {
      background: rgba(255, 255, 255, 0.65);
    }

    .visual {
      order: 2;
      width: 100%;
      max-width: min(420px, 100%);
      margin-inline: auto;
    }

    @media (min-width: 768px) {
      .visual {
        order: 2;
        max-width: none;
        margin-inline: 0;
        justify-self: stretch;
      }
    }

    .visual figure {
      margin: 0;
      /* border-radius: clamp(14px, 3vw, 22px); */
      overflow: hidden;
      /* box-shadow:
        0 4px 6px rgba(42, 20, 6, 0.08),
        0 28px 50px rgba(42, 20, 6, 0.18),
        0 0 0 1px rgba(255, 255, 255, 0.35) inset; */
    }

    .visual img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    /* @media (max-width: 767px) {
      .visual img {
        aspect-ratio: 16 / 10;
        max-height: min(52vh, 340px);
      }
    } */
  </style>
</head>
<body>
  <main class="shell">
    <div class="grid">
      <div class="copy">
        <h1>The smartest first move in any separation</h1>
        <p class="lede">
          Understand your options before you commit to anything. Nova gives you an expert-informed recommendation
        </p>
        <div class="cta-row">
          <a class="btn btn--primary" href="#">Get your free recommendation</a>
        </div>
      </div>
      <div class="visual">
        <figure>
          <img
            src="hero/opposite2.webp"
            alt="Two people facing each other in a thoughtful moment"
            width="640"
            height="800"
            loading="lazy"
            decoding="async"
          />
        </figure>
      </div>
    </div>
  </main>
</body>
</html>
