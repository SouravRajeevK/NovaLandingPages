<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Free divorce & separation recommendation — Nova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; }

    :root {
      --nova-dark-orange: #e8731e;
      --nova-dark-amber: #f6cf9b;
      --nova-active: #ffddb3;
      --nova-orange: #ff6a42;
      --hero-deep: #d45f18;
      --text: #ffffff;
      --tile-radius: clamp(18px, 2.5vw, 26px);
      --gap: clamp(14px, 2vw, 20px);
      --dock: calc(3.65rem + env(safe-area-inset-bottom, 0px));
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: "Poppins", system-ui, sans-serif;
      background: var(--nova-dark-orange);
      color: var(--text);
      line-height: 1.45;
      min-height: 100dvh;
    }

    @media (max-width: 879px) {
      html {
        scroll-padding-bottom: var(--dock);
      }
    }

    .page {
      display: grid;
      grid-template-columns: 1fr;
      min-height: 100dvh;
    }

    @media (max-width: 879px) {
      .page {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
    }

    @media (min-width: 880px) {
      .page {
        grid-template-columns: minmax(0, 1.05fr) minmax(340px, 0.95fr);
        min-height: 100dvh;
      }
    }

    /* —— Hero —— */
    .hero-panel {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(1.25rem, 4vw, 2.75rem) clamp(1.25rem, 5vw, 4rem);
      background: linear-gradient(
        165deg,
        var(--nova-orange) 0%,
        var(--nova-dark-orange) 48%,
        var(--hero-deep) 100%
      );
    }

    @media (max-width: 879px) {
      .hero-panel {
        flex: 0 0 auto;
        padding: 1.15rem 1.2rem 1.25rem;
        border-radius: 0 0 1.35rem 1.35rem;
        box-shadow: 0 12px 40px rgba(90, 40, 8, 0.18);
      }
    }

    .hero-panel::before {
      content: "";
      position: absolute;
      inset: -20% -30% auto -35%;
      height: 85%;
      background: radial-gradient(ellipse 70% 60% at 30% 100%, rgba(255, 221, 179, 0.22), transparent 55%);
      pointer-events: none;
    }

    .hero-panel::after {
      content: "";
      position: absolute;
      left: -15%;
      bottom: -25%;
      width: 95%;
      height: 70%;
      background: radial-gradient(ellipse 55% 45% at 40% 100%, rgba(246, 207, 155, 0.4), transparent 60%);
      filter: blur(2px);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: clamp(1.25rem, 3vh, 2rem);
      flex: 1;
      justify-content: center;
      padding-block: clamp(0.5rem, 2vh, 1.5rem);
      max-width: 34rem;
    }

    @media (max-width: 879px) {
      .hero-inner {
        gap: 0.85rem;
        padding-block: 0;
        flex: 0 0 auto;
        justify-content: flex-start;
        max-width: none;
      }
    }

    .brand {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: inherit;
    }

    .brand-logo {
      height: 66px;
      width: auto;
      display: block;
      object-fit: contain;
      object-position: 0 50%;
    }

    h1 {
      font-weight: 700;
      font-size: clamp(2rem, 5.2vw + 0.5rem, 3.35rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      text-wrap: balance;
    }

    @media (max-width: 879px) {
      h1 {
        font-size: clamp(1.45rem, 6.2vw, 1.85rem);
        line-height: 1.1;
      }
    }

    .sub {
      font-weight: 500;
      font-size: clamp(0.9rem, 1.6vw, 1.02rem);
      opacity: 0.92;
      max-width: 28rem;
    }

    @media (max-width: 879px) {
      .sub {
        font-size: 0.84rem;
        line-height: 1.45;
        opacity: 0.9;
      }
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: center;
      margin-top: 0.25rem;
    }

    @media (max-width: 879px) {
      .cta-row {
        display: none;
      }
    }

    .cta {
      position: relative;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 0.85rem 1.65rem;
      font-weight: 600;
      font-size: clamp(0.82rem, 2.6vw, 0.95rem);
      line-height: 1.25;
      text-align: center;
      color: #9a4410;
      text-decoration: none;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      background: linear-gradient(145deg, #fff 0%, var(--nova-active) 45%, var(--nova-dark-amber) 100%);
      box-shadow:
        0 14px 32px rgba(90, 40, 8, 0.22),
        0 1px 0 rgba(255, 255, 255, 0.75) inset;
      transition:
        transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1),
        box-shadow 0.35s ease,
        filter 0.35s ease,
        background 0.38s ease,
        color 0.32s ease,
        border-color 0.32s ease;
    }

    .cta::after {
      content: "";
      position: absolute;
      top: 0;
      left: -40%;
      width: 45%;
      height: 100%;
      background: linear-gradient(
        100deg,
        transparent 0%,
        rgba(255, 255, 255, 0.55) 45%,
        transparent 90%
      );
      transform: skewX(-18deg) translateX(-120%);
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }

    @media (hover: hover) and (pointer: fine) {
      .cta:hover {
        color: #fff;
        border-color: rgba(255, 221, 179, 0.55);
        background: linear-gradient(
          145deg,
          var(--nova-orange) 0%,
          var(--nova-dark-orange) 52%,
          var(--hero-deep) 100%
        );
        transform: translateY(-3px) scale(1.02);
        box-shadow:
          0 20px 42px rgba(232, 115, 30, 0.45),
          0 0 0 1px rgba(255, 221, 179, 0.5),
          0 1px 0 rgba(255, 255, 255, 0.35) inset;
        filter: saturate(1.05);
      }

      .cta:hover::after {
        transform: skewX(-18deg) translateX(280%);
      }
    }

    .meta {
      font-size: 0.75rem;
      font-weight: 500;
      opacity: 0.78;
      width: 100%;
    }

    @media (max-width: 879px) {
      .meta {
        font-size: 0.68rem;
        margin-top: 0.35rem;
        opacity: 0.72;
      }
    }

    /* —— Masonry —— */
    .grid-panel {
      background: var(--nova-dark-orange);
      padding: var(--gap);
      padding-bottom: max(var(--gap), var(--dock));
    }

    @media (max-width: 879px) {
      .grid-panel {
        flex: 1 1 auto;
        padding: 1rem 1rem calc(1.1rem + var(--dock));
        background: linear-gradient(180deg, #c95a18 0%, var(--hero-deep) 55%, #b45312 100%);
      }
    }

    @media (min-width: 880px) {
      .grid-panel {
        padding: var(--gap) var(--gap) var(--gap) 0;
        padding-bottom: var(--gap);
        display: flex;
        align-items: center;
        min-height: 100dvh;
      }
    }

    .masonry {
      width: 100%;
      columns: 2;
      column-gap: var(--gap);
    }

    @media (max-width: 879px) {
      .masonry {
        columns: unset;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        width: 100%;
        max-width: 520px;
        margin-inline: auto;
      }

      .masonry .tile:nth-child(n + 6) {
        display: none;
      }

      .masonry .tile:first-child {
        grid-column: 1 / -1;
        height: clamp(148px, 36vw, 208px);
        margin-bottom: 0;
      }

      .masonry .tile:first-child img {
        width: 100%;
        height: 100%;
        min-height: 100%;
        object-fit: cover;
      }

      .masonry .tile:not(:first-child) {
        aspect-ratio: 1;
        margin-bottom: 0;
      }
    }

    @media (min-width: 880px) {
      .masonry {
        max-height: min(96dvh, 920px);
      }
    }

    .tile {
      break-inside: avoid;
      margin-bottom: var(--gap);
      border-radius: var(--tile-radius);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.1);
      box-shadow:
        0 22px 48px rgba(90, 40, 8, 0.25),
        0 0 0 1px rgba(255, 221, 179, 0.12) inset;
    }

    @media (max-width: 879px) {
      .tile {
        border-radius: 14px;
        box-shadow:
          0 10px 26px rgba(50, 25, 6, 0.28),
          0 0 0 1px rgba(255, 221, 179, 0.14) inset;
      }
    }

    .tile img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .tile--tall img {
      min-height: clamp(200px, 32vw, 280px);
    }

    .tile--mid img {
      min-height: clamp(150px, 22vw, 200px);
    }

    .tile--short img {
      min-height: clamp(120px, 18vw, 160px);
    }

    @media (max-width: 879px) {
      .masonry .tile--tall img,
      .masonry .tile--mid img,
      .masonry .tile--short img {
       min-height: 0;
      }

      .masonry .tile:not(:first-child) img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    }

    .dock {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 0.6rem 1rem max(0.6rem, env(safe-area-inset-bottom));
      background: rgba(232, 115, 30, 0.94);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(246, 207, 155, 0.35);
    }

    @media (min-width: 880px) {
      .dock {
        display: none;
      }
    }

    .dock .cta {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      display: flex;
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero-panel" aria-labelledby="v6-h">
      <div class="hero-inner">
        <a class="brand" href="#" aria-label="Nova home">
          <img
            class="brand-logo"
            src="logo/Logo.png"
            alt="Nova"
            width="203"
            height="66"
            decoding="async"
            fetchpriority="high"
          />
        </a>

        <div>
          <h1 id="v6-h">Moving forward is possible. Let's show you how.</h1>
          <p class="sub">A few questions. A free personalised recommendation. A clearer picture of what comes next.</p>
        </div>

        <div>
          <div class="cta-row">
            <a class="cta" href="#">Get your free recommendations</a>
          </div>
          <p class="meta">Ready in 10 minutes  ·  Your data stays private</p>
        </div>
      </div>
    </section>

    <section class="grid-panel" aria-label="Examples">
      <div class="masonry">
        <article class="tile tile--tall">
          <img src="hero/doorbackground.webp" alt="" width="800" height="1000" loading="lazy" decoding="async" />
        </article>
        <article class="tile tile--mid">
          <img src="hero/couplesad.webp" alt="" width="400" height="500" loading="lazy" decoding="async" />
        </article>
        <article class="tile tile--short">
          <img src="hero/family.webp" alt="" width="400" height="300" loading="lazy" decoding="async" />
        </article>
        <article class="tile tile--mid">
          <img src="hero/oppositecouples.webp" alt="" width="400" height="520" loading="lazy" decoding="async" />
        </article>
        <!-- <article class="tile tile--tall">
          <img src="hero/doorbackground.webp" alt="" width="800" height="900" loading="lazy" decoding="async" style="object-position: 50% 60%" />
        </article>
        <article class="tile tile--mid">
          <img src="hero/couplesad.webp" alt="" width="400" height="480" loading="lazy" decoding="async" style="object-position: 80% 20%" />
        </article> -->
      </div>
    </section>
  </div>

  <div class="dock"><a class="cta" href="#">Get your free recommendations</a></div>
</body>
</html>
