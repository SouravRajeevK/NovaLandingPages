<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Start with Nova — divorce and separation with clarity. Get your free recommendation in minutes." />
  <title>Nova — Get started</title>
  <style>
    @font-face { font-family: "NeueHaasDisplay"; src: url("fonts/NeueHaasDisplayRoman.woff") format("woff"); font-weight: 400; font-display: swap; }
    @font-face { font-family: "NeueHaasDisplay"; src: url("fonts/NeueHaasDisplayMediu.woff") format("woff"); font-weight: 500; font-display: swap; }
    @font-face { font-family: "PerfectlyNineties"; src: url("fonts/PerfectlyNineties-Regular.woff") format("woff"); font-weight: 400; font-display: swap; }
    @font-face { font-family: "PerfectlyNineties"; src: url("fonts/PerfectlyNineties-Italic.woff") format("woff"); font-weight: 400; font-style: italic; font-display: swap; }

    :root {
      --cream: #fcfbf9;
      --ink: #141414;
      --muted: #4a4a4a;
      --container: min(100% - 2rem, 1140px);
      --nova-dark-orange: #E8731E;
      --nova-dark-amber: #F6CF9B;
      --nova-active: #FFDDB3;
      --nova-orange: #FF6A42;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "PerfectlyNineties", Georgia, "Times New Roman", serif;
      color: var(--ink);
      background-color: var(--cream);
      background-image:
        radial-gradient(ellipse 85% 60% at 92% 6%, rgba(200, 175, 235, 0.38), transparent 58%),
        radial-gradient(ellipse 70% 50% at 48% -5%, rgba(255, 205, 175, 0.35), transparent 52%),
        radial-gradient(ellipse 75% 55% at 8% 88%, rgba(240, 175, 190, 0.36), transparent 55%),
        url("gradients/howworksgradient.webp");
      background-size: auto, auto, auto, cover;
      background-position: center, center, center, center;
      background-repeat: no-repeat, no-repeat, no-repeat, no-repeat;
      background-attachment: fixed;
      line-height: 1.55;
      font-size: clamp(1rem, 0.95rem + 0.2vw, 1.0625rem);
      -webkit-font-smoothing: antialiased;
    }
    .sans { font-family: "NeueHaasDisplay", system-ui, sans-serif; }
    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; }

    .page-shell {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 1rem 1rem 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    .nav-pill {
      pointer-events: auto;
      width: min(100%, 1080px);
      display: flex;
      align-items: center;
      justify-content: center;
      /* padding: 0.55rem 1rem 0.55rem 1.1rem; */
      /* border-radius: 999px; */
      /* background: rgba(255, 255, 255, 0.52); */
      /* border: 1px solid rgba(255, 255, 255, 0.75); */
      /* box-shadow: 0 4px 32px rgba(20, 20, 20, 0.06); */
      /* backdrop-filter: blur(18px); */
      /* -webkit-backdrop-filter: blur(18px); */
    }
    .nav-pill .brand img { height: 66px; width: auto; display: block; }
    .nav-pill .brand { text-decoration: none; flex-shrink: 0; }

    .btn-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.72rem 1.65rem;
      border-radius: 999px;
      font-family: "NeueHaasDisplay", system-ui, sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .btn-pill:active { transform: scale(0.98); }
    .btn-pill-solid {
      background: var(--ink);
      color: #fff;
    }
    .btn-pill-solid:hover {
      background: linear-gradient(135deg, var(--nova-orange) 0%, var(--nova-dark-orange) 100%);
      color: #fff;
      box-shadow:
        0 10px 32px rgba(255, 106, 66, 0.42),
        0 0 0 1px rgba(246, 207, 155, 0.55),
        inset 0 1px 0 rgba(255, 221, 179, 0.65);
    }
    .btn-pill-solid:focus-visible {
      outline: 2px solid var(--nova-orange);
      outline-offset: 3px;
    }

    .container { width: var(--container); margin-inline: auto; padding-inline: 1rem; }

    main { flex: 1; display: flex; flex-direction: column; align-items: center; }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: clamp(1.5rem, 4vw, 3rem) 1rem clamp(2.5rem, 6vw, 4rem);
    }
    .hero-grid {
      display: grid;
      gap: clamp(2rem, 4vw, 3rem);
      align-items: center;
      justify-items: center;
      width: 100%;
      max-width: min(100%, 640px);
      margin-inline: auto;
      text-align: center;
    }
    .hero-copy {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .hero-copy h1 {
      font-family: "PerfectlyNineties", Georgia, serif;
      font-weight: 400;
      font-size: clamp(2.15rem, 4.2vw, 3.35rem);
      line-height: 1.08;
      letter-spacing: -0.02em;
      margin: 0 0 1.25rem;
      color: var(--ink);
      max-width: 22ch;
    }
    .hero-copy .lead {
      margin: 0 0 1.75rem;
      max-width: 42ch;
      color: var(--muted);
      font-family: "NeueHaasDisplay", system-ui, sans-serif;
      font-weight: 400;
      font-size: 1.05rem;
      line-height: 1.6;
    }
    .hero-ctas { display: flex; flex-wrap: wrap; gap: 0.65rem; align-items: center; justify-content: center; }
    .hero-art {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .hero-art img {
      width: min(100%, 520px);
      height: auto;
      filter: drop-shadow(0 20px 48px rgba(20, 20, 20, 0.08));
    }
    .hero-art::after {
      content: "";
      position: absolute;
      width: min(72%, 320px);
      height: min(72%, 320px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232, 197, 71, 0.12) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="nav-wrap">
      <header class="nav-pill" aria-label="Primary">
        <a class="brand" href="index.html"><img src="logo/Logo.png" alt="Nova" width="248" height="66" /></a>
      </header>
    </div>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <div class="container hero-grid">
          <div class="hero-copy">
            <h1 id="hero-title">Relationships are complicated. Your divorce needn&rsquo;t be.</h1>
            <p class="lead">Tell us your situation in a few minutes and get a clear, private recommendation no obligation.</p>
            <div class="hero-ctas">
              <a class="btn-pill btn-pill-solid sans" href="#">Get your free recommendation</a>
            </div>
          </div>
          <div class="hero-art">
            <img src="hero/opposite2.webp" alt="Illustration of two people standing apart, reflecting separation" width="900" height="650" loading="eager" />
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
