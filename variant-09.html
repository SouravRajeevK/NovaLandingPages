<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Understand your separation options — Nova</title>
  <style>
    @font-face { font-family: "Perfectly Nineties"; src: url("fonts/PerfectlyNineties-Regular.woff") format("woff"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "Neue Haas Display"; src: url("fonts/NeueHaasDisplayRoman.woff") format("woff"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "Neue Haas Display"; src: url("fonts/NeueHaasDisplayMediu.woff") format("woff"); font-weight: 500; font-style: normal; font-display: swap; }
    * { box-sizing: border-box; margin: 0; }
    :root { --dock: calc(3.85rem + env(safe-area-inset-bottom, 0px)); }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "Neue Haas Display", system-ui, sans-serif;
      background: #0e1116; color: #e2e8f0; -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      max-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.35;
      background: url("gradients/resultquotegradientmobile.webp") 50% 110% / 90% no-repeat;
    }
    main {
      position: relative; z-index: 1;
      flex: 1 1 auto;
      min-height: 0;
      max-height: calc(100dvh - var(--dock));
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .head { flex-shrink: 0; padding: 0.55rem 1.1rem 0.35rem; max-width: 720px; margin: 0 auto; width: 100%; }
    .logo img { height: 28px; width: auto; margin-bottom: 0.75rem; filter: brightness(0) invert(1); opacity: 0.95; }
    h1 {
      font-family: "Perfectly Nineties", Georgia, serif; font-weight: 400;
      font-size: clamp(1.35rem, 4vw, 2.15rem); line-height: 1.08; letter-spacing: -0.03em;
      margin-bottom: 0.3rem; text-wrap: balance;
    }
    .head p { font-size: clamp(0.78rem, 2vw, 0.88rem); opacity: 0.85; margin-bottom: 0.45rem; max-width: 42ch; }
    .cta-top {
      display: inline-flex; padding: 0.85rem 1.35rem; font-weight: 500; color: #0c1220; text-decoration: none;
      background: #f8fafc; border-radius: 999px; margin-bottom: 0.5rem;
    }
    .micro-h { font-size: 0.62rem; opacity: 0.6; margin-bottom: 0.35rem; }
    .story {
      flex: 1 1 auto;
      min-height: 0;
      display: flex; gap: 0.55rem; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory;
      padding: 0.25rem 1rem 0.45rem; -webkit-overflow-scrolling: touch;
      align-items: center;
    }
    .story::-webkit-scrollbar { height: 4px; }
    .slide {
      flex: 0 0 auto; scroll-snap-align: start; border-radius: 14px; overflow: hidden;
      position: relative; width: min(70vw, 248px); height: min(46vh, 300px); background: #1e293b;
    }
    .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .slide figcaption {
      position: absolute; left: 0; right: 0; bottom: 0; padding: 0.75rem;
      background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
      font-size: 0.78rem; font-weight: 500; line-height: 1.35;
    }
    .dock {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
      padding: 0.6rem 1rem max(0.6rem, env(safe-area-inset-bottom));
      background: rgba(14,17,22,0.94); backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .dock a {
      display: flex; justify-content: center; width: 100%; max-width: 420px; margin: 0 auto;
      padding: 0.95rem; font-weight: 500; color: #0c1220; text-decoration: none;
      background: #f1f5f9; border-radius: 999px;
    }
  </style>
</head>
<body>
  <main>
    <header class="head">
      <div class="logo"><img src="logo/Logo.png" alt="Nova" width="110" height="28" decoding="async" /></div>
      <h1>From uncertainty to a plan — in one short session</h1>
      <p>Swipe the story. Nova turns your situation into <strong>clear next steps</strong> with AI + family law experts.</p>
      <a class="cta-top" href="#">Get Started Now</a>
      <p class="micro-h">5–10 min · Confidential · No obligation</p>
    </header>

    <div class="story" role="group" aria-label="Visual story">
      <figure class="slide">
        <img src="hero/couplesad.webp" alt="" width="600" height="800" fetchpriority="high" decoding="async" />
        <figcaption>Heavy news. It’s OK not to have it figured out yet.</figcaption>
      </figure>
      <figure class="slide">
        <img src="hero/doorbackground.webp" alt="" width="600" height="800" decoding="async" />
        <figcaption>A new chapter starts with one honest conversation — with yourself.</figcaption>
      </figure>
      <figure class="slide">
        <img src="hero/family.webp" alt="" width="600" height="800" decoding="async" />
        <figcaption>Clarity for children, money, and timing — personalised to you.</figcaption>
      </figure>
      <figure class="slide">
        <img src="hero/oppositecouples.webp" alt="" width="600" height="800" decoding="async" />
        <figcaption>The right expert, when you’re ready. No pressure.</figcaption>
      </figure>
    </div>

  </main>
  <div class="dock"><a href="#">Get Started Now</a></div>
</body>
</html>
